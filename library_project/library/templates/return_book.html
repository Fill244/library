{% extends "base.html" %}

{% block content %}

<div class="card p-4 col-md-6 mx-auto">
    <h3 class="mb-3">Возврат книги</h3>

    <p>
        <strong>Читатель:</strong> {{ loan.reader.fio }} <br>
        <strong>Книга:</strong> {{ loan.book.title }}
    </p>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-warning">Принять возврат</button>
        <a href="/overdue/" class="btn btn-secondary">Назад</a>
    </form>
</div>

{% endblock %}
