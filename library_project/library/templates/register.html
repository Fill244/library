{% extends "base.html" %}

{% block content %}

<div class="card p-4 col-md-4 mx-auto">
    <h3 class="mb-3">Регистрация</h3>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-success w-100">Зарегистрироваться</button>
    </form>

    <div class="mt-3 text-center">
        Уже есть аккаунт? <a href="/login/">Войти</a>
    </div>
</div>

{% endblock %}
